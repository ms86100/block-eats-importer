# Codemagic CI/CD Configuration for Sociva
# Builds iOS and Android apps in the cloud - no Mac required!
#
# Setup Instructions:
# 1. Connect this repo to Codemagic (codemagic.io)
# 2. Add required environment variables (see below)
# 3. Trigger a build!

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Sociva App Store Connect
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.sociva.community
      vars:
        BUNDLE_ID: "app.sociva.community"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      xcode: latest
    
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
          
      - name: Build web app
        script: npm run build
          
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
          
      - name: Copy Firebase config
        script: |
          cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist copied to iOS project"

      - name: Update iOS project settings
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj

      - name: Add iOS capabilities (Push Notifications & Background Modes)
        script: |
          cd ios/App
          # Add Push Notifications entitlement
          ENTITLEMENTS_FILE="App/App.entitlements"
          if [ ! -f "$ENTITLEMENTS_FILE" ]; then
            cat > "$ENTITLEMENTS_FILE" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          EOF
            echo "Created entitlements file with Push Notifications"
          else
            # Add aps-environment if not already present
            /usr/libexec/PlistBuddy -c "Add :aps-environment string production" "$ENTITLEMENTS_FILE" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Set :aps-environment production" "$ENTITLEMENTS_FILE"
            echo "Updated entitlements with Push Notifications"
          fi

          # Add entitlements reference to project.pbxproj if not already present
          if ! grep -q "App.entitlements" App.xcodeproj/project.pbxproj; then
            sed -i '' 's/CODE_SIGN_IDENTITY/CODE_SIGN_ENTITLEMENTS = App\/App.entitlements;\n\t\t\t\tCODE_SIGN_IDENTITY/g' App.xcodeproj/project.pbxproj
            echo "Added entitlements reference to Xcode project"
          fi

          # Add Background Modes to Info.plist (remote-notification + fetch)
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" App/Info.plist
          echo "Added Background Modes (remote-notification, fetch) to Info.plist"
          
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "app.sociva.community" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Set export compliance & increment build number
        script: |
          cd ios/App
          # Ensure export compliance flag is in Info.plist so App Store Connect auto-clears it
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist
          BUILD_NUMBER=$(date +%s)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER
          
      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App" \
            --config "Release"
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.dSYM.zip
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      android_signing:
        - sociva_keystore
      groups:
        - google_play
      vars:
        BUNDLE_ID: "app.sociva.community"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      java: 17
    
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
          
      - name: Build web app
        script: npm run build
          
      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android
          
      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
      - name: Build Android release bundle
        script: cd android && ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  release-all:
    name: Release All Platforms
    max_build_duration: 90
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Sociva App Store Connect
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.sociva.community
      android_signing:
        - sociva_keystore
      groups:
        - google_play
      vars:
        BUNDLE_ID: "app.sociva.community"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      xcode: latest
      java: 17
    
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
          
      - name: Build web app
        script: npm run build
          
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Copy Firebase config (iOS)
        script: |
          cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist copied to iOS project"
          
      - name: Update iOS project settings
        script: |
          cd ios/App
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = .*;/PRODUCT_BUNDLE_IDENTIFIER = $BUNDLE_ID;/g" App.xcodeproj/project.pbxproj

      - name: Add iOS capabilities (Push Notifications & Background Modes)
        script: |
          cd ios/App
          ENTITLEMENTS_FILE="App/App.entitlements"
          if [ ! -f "$ENTITLEMENTS_FILE" ]; then
            cat > "$ENTITLEMENTS_FILE" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          EOF
            echo "Created entitlements file with Push Notifications"
          else
            /usr/libexec/PlistBuddy -c "Add :aps-environment string production" "$ENTITLEMENTS_FILE" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Set :aps-environment production" "$ENTITLEMENTS_FILE"
            echo "Updated entitlements with Push Notifications"
          fi

          if ! grep -q "App.entitlements" App.xcodeproj/project.pbxproj; then
            sed -i '' 's/CODE_SIGN_IDENTITY/CODE_SIGN_ENTITLEMENTS = App\/App.entitlements;\n\t\t\t\tCODE_SIGN_IDENTITY/g' App.xcodeproj/project.pbxproj
            echo "Added entitlements reference to Xcode project"
          fi

          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" App/Info.plist
          echo "Added Background Modes (remote-notification, fetch) to Info.plist"

      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "app.sociva.community" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Set export compliance & increment build number
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist
          BUILD_NUMBER=$(date +%s)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER

      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme "App" \
            --config "Release"
             
      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android
          
      - name: Set Android SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
      - name: Build Android AAB
        script: cd android && ./gradlew bundleRelease
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - android/app/build/outputs/**/*.aab
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
