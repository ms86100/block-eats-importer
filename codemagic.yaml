# Codemagic CI/CD Configuration for Sociva
# Builds iOS and Android apps in the cloud - no Mac required!
#
# Setup Instructions:
# 1. Connect this repo to Codemagic (codemagic.io)
# 2. Add required environment variables (see below)
# 3. Trigger a build!

workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Sociva App Store Connect
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.sociva.community
      vars:
        BUNDLE_ID: "app.sociva.community"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      xcode: latest
    
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
          
      - name: Build web app
        script: npm run build
          
      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios --packagemanager cocoapods
          npx cap sync ios
          # Verify Podfile was generated (required for Firebase pod injection)
          if [ ! -f ios/App/Podfile ]; then
            echo "❌ FATAL: Podfile not found after iOS platform setup"
            ls -la ios/App/ || echo "ios/App directory does not exist"
            exit 1
          fi
          echo "✅ iOS platform ready with CocoaPods (Podfile exists)"

      - name: Patch AppDelegate for Firebase & Push Notifications
        script: |
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          echo "── Original AppDelegate ──"
          cat "$APPDELEGATE"
          echo "── End Original ──"
          
          # Write the complete AppDelegate with all required push notification support
          cat > "$APPDELEGATE" << 'SWIFT'
          import UIKit
          import Capacitor
          import FirebaseCore

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  // Initialize Firebase BEFORE Capacitor so FCM can register for push
                  FirebaseApp.configure()
                  return true
              }

              func application(_ application: UIApplication, configurationForConnecting connectingSceneSession: UISceneSession, options: UIScene.ConnectionOptions) -> UISceneConfiguration {
                  return UISceneConfiguration(name: "Default Configuration", sessionRole: connectingSceneSession.role)
              }

              func application(_ application: UIApplication, didDiscardSceneSessions sceneSessions: Set<UISceneSession>) {
              }

              // Forward APNs token to Capacitor + Firebase (critical for push notifications)
              func application(_ application: UIApplication,
                               didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
                  NotificationCenter.default.post(
                      name: .capacitorDidRegisterForRemoteNotifications,
                      object: deviceToken)
              }

              // Forward APNs registration failure to Capacitor
              func application(_ application: UIApplication,
                               didFailToRegisterForRemoteNotificationsWithError error: Error) {
                  NotificationCenter.default.post(
                      name: .capacitorDidFailToRegisterForRemoteNotifications,
                      object: error)
              }
          }
          SWIFT
          
          echo "── Patched AppDelegate ──"
          cat "$APPDELEGATE"
          echo "── End Patched ──"
          echo "✅ AppDelegate written with Firebase init + APNs token forwarding"
          
      - name: Add Privacy Manifest
        script: |
          PRIVACY_FILE="ios/App/App/PrivacyInfo.xcprivacy"
          cat > "$PRIVACY_FILE" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSPrivacyCollectedDataTypes</key>
            <array/>
            <key>NSPrivacyTracking</key>
            <false/>
            <key>NSPrivacyTrackingDomains</key>
            <array/>
            <key>NSPrivacyAccessedAPITypes</key>
            <array>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryUserDefaults</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>CA92.1</string>
                </array>
              </dict>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryFileTimestamp</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>C617.1</string>
                </array>
              </dict>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryDiskSpace</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>E174.1</string>
                </array>
              </dict>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategorySystemBootTime</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>35F9.1</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST
          echo "✅ PrivacyInfo.xcprivacy created"

      - name: Copy Firebase config
        script: |
          cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist copied to iOS project"

      - name: Inject Firebase pods into Podfile
        script: |
          cd ios/App
          # Guard: Podfile must exist (generated by cap sync)
          if [ ! -f Podfile ]; then
            echo "❌ ERROR: Podfile not found in ios/App. Ensure 'npx cap sync ios' ran successfully."
            exit 1
          fi
          if ! grep -q "FirebaseMessaging" Podfile; then
            sed -i '' "/target 'App' do/a\\
            pod 'FirebaseMessaging'
          " Podfile
            echo "✅ Added FirebaseMessaging pod to Podfile"
          else
            echo "ℹ️ FirebaseMessaging already in Podfile — skipping"
          fi
          pod install

      - name: Configure Xcode project (entitlements, resources, capabilities)
        script: |
          cd ios/App
          
          # --- 1. Create entitlements file ---
          ENTITLEMENTS_FILE="App/App.entitlements"
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>aps-environment</key>\n  <string>production</string>\n</dict>\n</plist>\n' > "$ENTITLEMENTS_FILE"
          echo "✅ Created entitlements file: $ENTITLEMENTS_FILE"
          
          # --- 2. Use Ruby xcodeproj to reliably configure the project ---
          ruby << 'RUBY'
          require 'xcodeproj'
          
          project_path = 'App.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.first
          
          puts "Target: #{target.name}"
          
          # --- Add GoogleService-Info.plist to build target ---
          group = project.main_group.find_subpath('App', true)
          unless target.resources_build_phase.files.any? { |f| f.display_name == 'GoogleService-Info.plist' }
            ref = group.new_file('../App/GoogleService-Info.plist')
            target.resources_build_phase.add_file_reference(ref)
            puts "✅ Added GoogleService-Info.plist to build target"
          else
            puts "ℹ️ GoogleService-Info.plist already in build target"
          end
          
          # --- Add entitlements to ALL build configurations ---
          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            puts "✅ Set CODE_SIGN_ENTITLEMENTS for #{config.name}"
          end
          
          # --- Set bundle identifier ---
          target.build_configurations.each do |config|
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = ENV['BUNDLE_ID'] || 'app.sociva.community'
          end
          puts "✅ Set PRODUCT_BUNDLE_IDENTIFIER"
          
          # --- Enable Push Notifications capability ---
          # Add SystemCapabilities for push notifications
          attributes = project.root_object.attributes
          target_attributes = attributes['TargetAttributes'] || {}
          target_id = target.uuid
          target_attrs = target_attributes[target_id] || {}
          
          system_capabilities = target_attrs['SystemCapabilities'] || {}
          system_capabilities['com.apple.Push'] = { 'enabled' => 1 }
          system_capabilities['com.apple.BackgroundModes'] = { 'enabled' => 1 }
          target_attrs['SystemCapabilities'] = system_capabilities
          target_attributes[target_id] = target_attrs
          attributes['TargetAttributes'] = target_attributes
          project.root_object.attributes = attributes
          puts "✅ Enabled Push Notifications & Background Modes capabilities"
          
          project.save
          puts "✅ Xcode project saved successfully"
          RUBY
          
          echo "✅ Xcode project configuration complete"

      - name: Add iOS Info.plist entries
        script: |
          cd ios/App
          
          # Background Modes
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" App/Info.plist
          echo "✅ Background Modes: remote-notification, fetch"
          
          # Privacy descriptions
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Sociva needs access to save photos to your library.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Sociva needs access to your photo library to select and upload photos.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Sociva uses your location to show nearby services and societies.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Sociva uses your location to show nearby services and societies, even in the background.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Sociva needs camera access to take photos for your profile, listings, and reports.'" App/Info.plist 2>/dev/null || true
          echo "✅ Privacy descriptions added"

      - name: Verify push notification setup
        script: |
          echo "══════════════════════════════════════════"
          echo "  PUSH NOTIFICATION SETUP VERIFICATION"
          echo "══════════════════════════════════════════"
          
          cd ios/App
          
          # 1. Check entitlements file exists and has aps-environment
          echo ""
          echo "1️⃣ Entitlements file:"
          if [ -f "App/App.entitlements" ]; then
            cat "App/App.entitlements"
            if grep -q "aps-environment" "App/App.entitlements"; then
              echo "✅ aps-environment key present"
            else
              echo "❌ MISSING aps-environment key!"
              exit 1
            fi
          else
            echo "❌ Entitlements file not found!"
            exit 1
          fi
          
          # 2. Check entitlements reference in pbxproj
          echo ""
          echo "2️⃣ Entitlements reference in Xcode project:"
          if grep -q "CODE_SIGN_ENTITLEMENTS" App.xcodeproj/project.pbxproj; then
            grep "CODE_SIGN_ENTITLEMENTS" App.xcodeproj/project.pbxproj
            echo "✅ CODE_SIGN_ENTITLEMENTS found in project"
          else
            echo "❌ CODE_SIGN_ENTITLEMENTS NOT found in project!"
            exit 1
          fi
          
          # 3. Check AppDelegate has Firebase and push methods
          echo ""
          echo "3️⃣ AppDelegate contents:"
          APPDELEGATE="App/AppDelegate.swift"
          if grep -q "FirebaseApp.configure" "$APPDELEGATE"; then
            echo "✅ FirebaseApp.configure() present"
          else
            echo "❌ FirebaseApp.configure() MISSING!"
            exit 1
          fi
          
          if grep -q "didRegisterForRemoteNotificationsWithDeviceToken" "$APPDELEGATE"; then
            echo "✅ didRegisterForRemoteNotificationsWithDeviceToken present"
          else
            echo "❌ didRegisterForRemoteNotificationsWithDeviceToken MISSING!"
            exit 1
          fi
          
          if grep -q "didFailToRegisterForRemoteNotificationsWithError" "$APPDELEGATE"; then
            echo "✅ didFailToRegisterForRemoteNotificationsWithError present"
          else
            echo "❌ didFailToRegisterForRemoteNotificationsWithError MISSING!"
            exit 1
          fi
          
          if grep -q "import FirebaseCore" "$APPDELEGATE"; then
            echo "✅ import FirebaseCore present"
          else
            echo "❌ import FirebaseCore MISSING!"
            exit 1
          fi
          
          # 4. Check Background Modes in Info.plist
          echo ""
          echo "4️⃣ Background Modes:"
          if /usr/libexec/PlistBuddy -c "Print :UIBackgroundModes" App/Info.plist 2>/dev/null | grep -q "remote-notification"; then
            echo "✅ remote-notification background mode enabled"
          else
            echo "❌ remote-notification background mode MISSING!"
            exit 1
          fi
          
          # 5. Check GoogleService-Info.plist
          echo ""
          echo "5️⃣ Firebase config:"
          if [ -f "App/GoogleService-Info.plist" ]; then
            echo "✅ GoogleService-Info.plist present"
          else
            echo "❌ GoogleService-Info.plist MISSING!"
            exit 1
          fi
          
          # 6. Check FirebaseMessaging pod
          echo ""
          echo "6️⃣ Firebase pod:"
          if grep -q "FirebaseMessaging" Podfile; then
            echo "✅ FirebaseMessaging pod in Podfile"
          else
            echo "❌ FirebaseMessaging pod MISSING!"
            exit 1
          fi
          
          # 7. Check Push capability in project
          echo ""
          echo "7️⃣ Push capability:"
          if grep -q "com.apple.Push" App.xcodeproj/project.pbxproj; then
            echo "✅ Push capability enabled in project"
          else
            echo "⚠️ Push capability not found in pbxproj (may still work via entitlements)"
          fi
          
          echo ""
          echo "══════════════════════════════════════════"
          echo "  ✅ ALL PUSH NOTIFICATION CHECKS PASSED"
          echo "══════════════════════════════════════════"

      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "app.sociva.community" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Set export compliance & increment build number
        script: |
          cd ios/App
          # Ensure export compliance flag is in Info.plist so App Store Connect auto-clears it
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist
          BUILD_NUMBER=$(date +%s)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER
          
      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.dSYM.zip
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      android_signing:
        - sociva_keystore
      groups:
        - google_play
      vars:
        BUNDLE_ID: "app.sociva.community"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      java: 17
    
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
          
      - name: Build web app
        script: npm run build
          
      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android
          
      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
      - name: Build Android release bundle
        script: cd android && ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  release-all:
    name: Release All Platforms
    max_build_duration: 90
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: Sociva App Store Connect
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.sociva.community
      android_signing:
        - sociva_keystore
      groups:
        - google_play
      vars:
        BUNDLE_ID: "app.sociva.community"
        APP_NAME: "Sociva"
        CAPACITOR_ENV: "production"
      node: 22
      xcode: latest
      java: 17
    
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
          
      - name: Build web app
        script: npm run build
          
      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios --packagemanager cocoapods
          npx cap sync ios
          if [ ! -f ios/App/Podfile ]; then
            echo "❌ FATAL: Podfile not found after iOS platform setup"
            ls -la ios/App/ || echo "ios/App directory does not exist"
            exit 1
          fi
          echo "✅ iOS platform ready with CocoaPods (Podfile exists)"

      - name: Patch AppDelegate for Firebase & Push Notifications
        script: |
          APPDELEGATE="ios/App/App/AppDelegate.swift"
          cat > "$APPDELEGATE" << 'SWIFT'
          import UIKit
          import Capacitor
          import FirebaseCore

          @UIApplicationMain
          class AppDelegate: UIResponder, UIApplicationDelegate {

              var window: UIWindow?

              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  FirebaseApp.configure()
                  return true
              }

              func application(_ application: UIApplication, configurationForConnecting connectingSceneSession: UISceneSession, options: UIScene.ConnectionOptions) -> UISceneConfiguration {
                  return UISceneConfiguration(name: "Default Configuration", sessionRole: connectingSceneSession.role)
              }

              func application(_ application: UIApplication, didDiscardSceneSessions sceneSessions: Set<UISceneSession>) {
              }

              func application(_ application: UIApplication,
                               didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
                  NotificationCenter.default.post(
                      name: .capacitorDidRegisterForRemoteNotifications,
                      object: deviceToken)
              }

              func application(_ application: UIApplication,
                               didFailToRegisterForRemoteNotificationsWithError error: Error) {
                  NotificationCenter.default.post(
                      name: .capacitorDidFailToRegisterForRemoteNotifications,
                      object: error)
              }
          }
          SWIFT
          echo "✅ AppDelegate written with Firebase init + APNs token forwarding"

      - name: Add Privacy Manifest
        script: |
          PRIVACY_FILE="ios/App/App/PrivacyInfo.xcprivacy"
          cat > "$PRIVACY_FILE" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>NSPrivacyCollectedDataTypes</key>
            <array/>
            <key>NSPrivacyTracking</key>
            <false/>
            <key>NSPrivacyTrackingDomains</key>
            <array/>
            <key>NSPrivacyAccessedAPITypes</key>
            <array>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryUserDefaults</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>CA92.1</string>
                </array>
              </dict>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryFileTimestamp</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>C617.1</string>
                </array>
              </dict>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategoryDiskSpace</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>E174.1</string>
                </array>
              </dict>
              <dict>
                <key>NSPrivacyAccessedAPIType</key>
                <string>NSPrivacyAccessedAPICategorySystemBootTime</string>
                <key>NSPrivacyAccessedAPITypeReasons</key>
                <array>
                  <string>35F9.1</string>
                </array>
              </dict>
            </array>
          </dict>
          </plist>
          PLIST
          echo "✅ PrivacyInfo.xcprivacy created"

      - name: Copy Firebase config (iOS)
        script: |
          cp ios-config/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist copied to iOS project"

      - name: Inject Firebase pods into Podfile
        script: |
          cd ios/App
          if [ ! -f Podfile ]; then
            echo "❌ ERROR: Podfile not found in ios/App."
            exit 1
          fi
          if ! grep -q "FirebaseMessaging" Podfile; then
            sed -i '' "/target 'App' do/a\\
            pod 'FirebaseMessaging'
          " Podfile
            echo "✅ Added FirebaseMessaging pod to Podfile"
          else
            echo "ℹ️ FirebaseMessaging already in Podfile — skipping"
          fi
          pod install

      - name: Configure Xcode project (entitlements, resources, capabilities)
        script: |
          cd ios/App
          
          # Create entitlements file
          ENTITLEMENTS_FILE="App/App.entitlements"
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>aps-environment</key>\n  <string>production</string>\n</dict>\n</plist>\n' > "$ENTITLEMENTS_FILE"
          echo "✅ Entitlements file created"
          
          # Use Ruby xcodeproj for reliable project configuration
          ruby << 'RUBY'
          require 'xcodeproj'
          
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.first
          
          # Add GoogleService-Info.plist to build target
          group = project.main_group.find_subpath('App', true)
          unless target.resources_build_phase.files.any? { |f| f.display_name == 'GoogleService-Info.plist' }
            ref = group.new_file('../App/GoogleService-Info.plist')
            target.resources_build_phase.add_file_reference(ref)
            puts "✅ Added GoogleService-Info.plist to build target"
          end
          
          # Set entitlements and bundle ID for ALL build configurations
          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = ENV['BUNDLE_ID'] || 'app.sociva.community'
            puts "✅ Configured #{config.name}: entitlements + bundle ID"
          end
          
          # Enable Push Notifications & Background Modes capabilities
          attributes = project.root_object.attributes
          target_attributes = attributes['TargetAttributes'] || {}
          target_attrs = target_attributes[target.uuid] || {}
          system_capabilities = target_attrs['SystemCapabilities'] || {}
          system_capabilities['com.apple.Push'] = { 'enabled' => 1 }
          system_capabilities['com.apple.BackgroundModes'] = { 'enabled' => 1 }
          target_attrs['SystemCapabilities'] = system_capabilities
          target_attributes[target.uuid] = target_attrs
          attributes['TargetAttributes'] = target_attributes
          project.root_object.attributes = attributes
          puts "✅ Push Notifications & Background Modes capabilities enabled"
          
          project.save
          puts "✅ Xcode project saved"
          RUBY

      - name: Add iOS Info.plist entries
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Delete :UIBackgroundModes" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string remote-notification" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:1 string fetch" App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Sociva needs access to save photos to your library.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Sociva needs access to your photo library to select and upload photos.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Sociva uses your location to show nearby services and societies.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 'Sociva uses your location to show nearby services and societies, even in the background.'" App/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Sociva needs camera access to take photos for your profile, listings, and reports.'" App/Info.plist 2>/dev/null || true
          echo "✅ Info.plist entries added"

      - name: Verify push notification setup
        script: |
          echo "══════ PUSH NOTIFICATION VERIFICATION ══════"
          cd ios/App
          
          # Entitlements
          grep -q "aps-environment" "App/App.entitlements" && echo "✅ aps-environment" || { echo "❌ aps-environment MISSING"; exit 1; }
          grep -q "CODE_SIGN_ENTITLEMENTS" App.xcodeproj/project.pbxproj && echo "✅ Entitlements linked" || { echo "❌ Entitlements NOT linked"; exit 1; }
          
          # AppDelegate
          grep -q "FirebaseApp.configure" "App/AppDelegate.swift" && echo "✅ FirebaseApp.configure()" || { echo "❌ FirebaseApp.configure() MISSING"; exit 1; }
          grep -q "didRegisterForRemoteNotificationsWithDeviceToken" "App/AppDelegate.swift" && echo "✅ APNs token forwarding" || { echo "❌ APNs token forwarding MISSING"; exit 1; }
          
          # Background modes
          /usr/libexec/PlistBuddy -c "Print :UIBackgroundModes" App/Info.plist 2>/dev/null | grep -q "remote-notification" && echo "✅ Background remote-notification" || { echo "❌ Background mode MISSING"; exit 1; }
          
          # Firebase config
          [ -f "App/GoogleService-Info.plist" ] && echo "✅ GoogleService-Info.plist" || { echo "❌ GoogleService-Info.plist MISSING"; exit 1; }
          grep -q "FirebaseMessaging" Podfile && echo "✅ FirebaseMessaging pod" || { echo "❌ FirebaseMessaging pod MISSING"; exit 1; }
          
          echo "══════ ALL CHECKS PASSED ══════"

      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "app.sociva.community" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          
      - name: Set export compliance & increment build number
        script: |
          cd ios/App
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" App/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" App/Info.plist
          BUILD_NUMBER=$(date +%s)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER

      - name: Build iOS IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"
             
      - name: Add Android platform
        script: |
          npx cap add android || true
          npx cap sync android
          
      - name: Set Android SDK
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          
      - name: Build Android AAB
        script: cd android && ./gradlew bundleRelease
    
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - android/app/build/outputs/**/*.aab
    
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
